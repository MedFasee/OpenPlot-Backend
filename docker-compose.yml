services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: openplot
      POSTGRES_USER: openplot
      POSTGRES_PASSWORD: openplot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init_SQL:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build:
      context: .
      dockerfile: OpenPlot.Api/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: Host=db;Port=5432;Database=openplot;Username=openplot;Password=openplot
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ../medplotweb-main_14112025/medplotweb-main/medplot-web
      dockerfile: ../Dockerfile
    env_file:
      - ../medplotweb-main_14112025/medplotweb-main/medplot-web/.env.development
    ports:
      - "5173:5173"
    volumes:
      - ../medplotweb-main_14112025/medplotweb-main/medplot-web/src:/app/src
      - ../medplotweb-main_14112025/medplotweb-main/medplot-web/public:/app/public
      - /app/node_modules
    depends_on:
      - api
    restart: unless-stopped

  ingestor:
    build:
      context: .
      dockerfile: OpenPlot.Ingestor.Gsf/Dockerfile
    environment:
      ConnectionStrings__Default: Host=db;Port=5432;Database=openplot;Username=openplot;Password=openplot
    depends_on:
      - db
    restart: unless-stopped

  exportworker:
    build:
      context: .
      dockerfile: OpenPlot.ExportWorker/Dockerfile
    environment:
      ConnectionStrings__Default: Host=db;Port=5432;Database=openplot;Username=openplot;Password=openplot
    depends_on:
      - db
    restart: unless-stopped

  xmlimporter:
    build:
      context: .
      dockerfile: OpenPlot.XmlImporter/Dockerfile
    environment:
      ConnectionStrings__Default: Host=db;Port=5432;Database=openplot;Username=openplot;Password=openplot
    depends_on:
      - db
    restart: "no"

volumes:
  pgdata: